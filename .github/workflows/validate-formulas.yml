name: Validate formulas

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build tars CLI
        run: |
          git clone --depth 1 https://github.com/chenchunaidu/tars.git /tmp/tars
          cd /tmp/tars && go build -o /tmp/tars-bin ./cmd/tars

      - name: Validate all formula JSON files
        shell: bash
        run: |
          mapfile -t files < <(find Formulas -type f -name '*.json' | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No formulas under Formulas/; nothing to validate."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "==> $f"
            /tmp/tars-bin publish validate "$f"
          done

      - name: Verify declared sha256 matches downloaded artifact
        run: |
          python3 << 'PY'
          import glob
          import hashlib
          import json
          import os
          import sys
          import urllib.request

          paths = sorted(
              p
              for p in glob.glob("Formulas/**/*.json", recursive=True)
              if os.path.isfile(p)
          )
          if not paths:
              print("No formulas; skipping checksum download check.")
              sys.exit(0)

          for path in paths:
              with open(path, encoding="utf-8") as f:
                  data = json.load(f)
              platforms = data.get("platforms") or {}
              if platforms:
                  pairs = [
                      (key, art["url"], art["sha256"].strip().lower())
                      for key, art in sorted(platforms.items())
                      if isinstance(art, dict)
                  ]
              else:
                  pairs = [
                      ("legacy", data["url"], data["sha256"].strip().lower())
                  ]
              for label, url, want in pairs:
                  req = urllib.request.Request(
                      url,
                      headers={"User-Agent": "tars-tools-ci/1.0"},
                  )
                  with urllib.request.urlopen(req, timeout=300) as resp:
                      body = resp.read()
                  got = hashlib.sha256(body).hexdigest()
                  if got != want:
                      print(
                          f"FAIL {path} [{label}]: sha256 mismatch",
                          file=sys.stderr,
                      )
                      print(f"  expected: {want}", file=sys.stderr)
                      print(f"  actual:   {got}", file=sys.stderr)
                      sys.exit(1)
                  print(f"OK {path} [{label}] ({len(body)} bytes)")
          PY
